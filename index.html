<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker Progress Report · Claim 20042047</title>
<meta name="description" content="Interactive Worker Progress Report — return to work, recovery, medical treatment and declaration.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="preload" href="assets/logo1.png" as="image" type="image/png">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/print.css" media="print">
</head>
<body>

<a class="skip-link" href="#main-content">Skip to report content</a>

<div class="toolbar no-print" role="toolbar" aria-label="Report actions">
  <div class="toolbar__inner">
    <span class="toolbar__brand">Worker Progress Report</span>
    <button type="button" id="print-action" class="btn btn--primary">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6v-8z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Print / Export
    </button>
  </div>
</div>

<main id="main-content" class="report">

  <!-- PAGE 1: Header, Worker Details, Return to Work, Recovery -->
  <section class="report-page" data-page="1" aria-labelledby="page-1-heading">
    <h2 id="page-1-heading" class="sr-only">Page 1: Return to Work and Recovery</h2>

    <header class="report-header" data-slot="header"></header>

    <p class="worker-banner" data-slot="worker"></p>

    <section class="card" aria-labelledby="rtw-heading">
      <h3 id="rtw-heading" class="card__heading">Return to Work</h3>
      <div class="card__body" data-slot="return-to-work"></div>
    </section>

    <section class="card" aria-labelledby="recovery-heading">
      <h3 id="recovery-heading" class="card__heading">Recovery</h3>
      <div class="card__body" data-slot="recovery"></div>
    </section>

    <footer class="page-footer" data-slot="footer"></footer>
  </section>

  <!-- PAGE 2: Pain Scale, Medical Treatment, Medication, Exercises, Additional Info -->
  <section class="report-page" data-page="2" aria-labelledby="page-2-heading">
    <h2 id="page-2-heading" class="sr-only">Page 2: Pain, Treatment and Medication</h2>

    <section class="card" aria-labelledby="pain-heading">
      <h3 id="pain-heading" class="card__heading">Pain Assessment</h3>
      <div class="card__body" data-slot="pain-scale"></div>
    </section>

    <section class="card" aria-labelledby="medical-heading">
      <h3 id="medical-heading" class="card__heading">Medical Treatment</h3>
      <div class="card__body" data-slot="medical"></div>
    </section>

    <section class="card" aria-labelledby="medication-heading">
      <h3 id="medication-heading" class="card__heading">Medication</h3>
      <div class="card__body" data-slot="medication"></div>
    </section>

    <section class="card" aria-labelledby="exercise-heading">
      <h3 id="exercise-heading" class="card__heading">Home Exercises</h3>
      <div class="card__body" data-slot="exercises"></div>
    </section>

    <section class="card" aria-labelledby="additional-heading">
      <h3 id="additional-heading" class="card__heading">Other Information</h3>
      <div class="card__body" data-slot="additional-info"></div>
    </section>

    <footer class="page-footer" data-slot="footer"></footer>
  </section>

  <!-- PAGE 3: Declaration -->
  <section class="report-page" data-page="3" aria-labelledby="page-3-heading">
    <h2 id="page-3-heading" class="sr-only">Page 3: Declaration and Privacy Notice</h2>

    <section class="card card--declaration" aria-labelledby="declaration-heading">
      <h3 id="declaration-heading" class="card__heading">Declaration</h3>
      <div class="card__body" data-slot="declaration"></div>
    </section>

    <footer class="page-footer" data-slot="footer"></footer>
  </section>

</main>

<script src="js/utils.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
